workspace_dir = "/gloamy-data/workspace"
config_path = "/gloamy-data/.gloamy/config.toml"
# This is the Ollama Base URL, not a secret key
api_key = "http://host.docker.internal:11434"
default_provider = "ollama"
default_model = "llama3.2"
default_temperature = 0.7

[agent]
self_learning = true
max_lessons_per_query = 3
max_tool_iterations = 50

[channels_config]
cli = true
# Allow long-running channel turns out of the box (20 minutes per iteration × 50 iterations)
message_timeout_secs = 1200

# Optional Telegram bot channel
# [channels_config.telegram]
# bot_token = "123456:telegram-token"
# allowed_users = ["*"]
# stream_mode = "partial"
# draft_update_interval_ms = 1000
# interrupt_on_new_message = true
# mention_only = false

[transcription]
enabled = false
api_url = "https://api.groq.com/openai/v1/audio/transcriptions"
model = "whisper-large-v3-turbo"
max_duration_secs = 120

[tts]
enabled = false
api_url = "https://api.openai.com/v1/audio/speech"
model = "tts-1"
voice = "alloy"
response_format = "opus"
max_input_chars = 4096
voice_reply_mode = "voice_only"

[observability]
runtime_trace_mode = "rolling"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 400

[browser]
enabled = true
backend = "auto"

[gui_verification]
approval_gate = "supervised_only"
approval_threshold = "irreversible"
approval_timeout_secs = 120

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true

# ── Autonomy (Full by default for maximum agent capability) ──
[autonomy]
level = "full"
workspace_only = false
allowed_commands = [
    "git",
    "npm",
    "cargo",
    "ls",
    "cat",
    "grep",
    "find",
    "echo",
    "pwd",
    "wc",
    "head",
    "tail",
    "date",
    "curl",
    "jq",
    "one",
    "osascript",
    "sleep",
    "open",
    "python3",
    "pandoc",
    "libreoffice",
    "wkhtmltopdf",
    "enscript",
    "ps2pdf",
    "which",
    "sed",
    "awk",
    "sort",
    "uniq",
    "cut",
    "tr",
    "xargs",
    "tee",
    "mkdir",
    "rm",
    "cp",
    "mv",
    "touch",
    "chmod",
    "tar",
    "zip",
    "unzip",
    "file",
    "base64",
    "md5",
    "shasum",
]
# Note: osascript and sleep are included for macOS automation skills
require_approval_for_medium_risk = false
block_high_risk_commands = false
max_actions_per_hour = 500
max_cost_per_day_cents = 5000
allowed_roots = ["~"]

# ── Composio (1000+ OAuth tools) ──
# Get your API key at https://composio.dev
[composio]
enabled = true
# api_key = "YOUR_COMPOSIO_API_KEY"

# ── One CLI (200+ platform integrations) ──
# Get your API key at https://one.dev
[one]
enabled = true
# api_key = "YOUR_ONE_API_KEY"

# ── Default Sub-Agents for Delegation ──
# These are pre-configured agents you can delegate tasks to.
# Just add your API keys to the provider configs above.

[agents.researcher]
provider = "openai"
model = "gpt-4o-mini"
system_prompt = "You are a research assistant. Search the web, gather information, and provide concise summaries."
temperature = 0.3
max_depth = 2
agentic = true
allowed_tools = ["web_search", "web_fetch", "memory_store"]
max_iterations = 50

[agents.coder]
provider = "openai"
model = "gpt-4o"
system_prompt = "You are an expert programmer. Write clean, efficient code with proper error handling."
temperature = 0.2
max_depth = 3
agentic = true
allowed_tools = ["file_read", "file_write", "shell"]
max_iterations = 50

[agents.browser]
provider = "openai"
model = "gpt-4.1"
system_prompt = "You are a browser automation sub-agent. Navigate websites, click elements, fill forms, and extract information. Always verify the page state before and after actions."
max_depth = 2
agentic = true
allowed_tools = [
    "browser",
    "browser_open",
    "web_fetch",
    "web_search",
    "http_request",
    "file_read",
    "file_write",
    "file_edit",
    "memory_recall",
    "memory_save",
    "shell",
    "glob_search",
    "content_search",
]
max_iterations = 30

[agents.writer]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
system_prompt = "You are a skilled writer. Create clear, engaging content."
temperature = 0.7
max_depth = 2
agentic = false
max_iterations = 50
